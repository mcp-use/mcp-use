name: MCP Server Evals

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read

jobs:
  evals:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Run the eval suite against a remote MCP server.
      - uses: mcp-use/mcp-use/libraries/typescript/packages/evals/action@canary
        id: evals
        with:
          eval_suite: evals/smoke.suite.yaml
          openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          # Either point at a running server:
          server_url: https://my-server.example.com/mcp
          # ...or launch a stdio server as a subprocess:
          # server_config: |
          #   {
          #     "command": "node",
          #     "args": ["dist/index.js", "--stdio"],
          #     "env": { "API_KEY": "${{ secrets.API_KEY }}" }
          #   }

      # Post the report as a sticky PR comment.
      - uses: marocchino/sticky-pull-request-comment@v2
        if: always() && github.event_name == 'pull_request'
        with:
          header: mcp-evals
          path: ${{ steps.evals.outputs.report_md }}

      # Also surface it in the Actions run summary.
      - run: cat "${{ steps.evals.outputs.report_md }}" >> "$GITHUB_STEP_SUMMARY"
        if: always()

      # Keep the raw results around for inspection.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: |
            ${{ steps.evals.outputs.results_json }}
            ${{ steps.evals.outputs.report_md }}
          retention-days: 30
